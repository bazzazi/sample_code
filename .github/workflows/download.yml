name: Build Gadgetbridge

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: reactnativecommunity/react-native-android:latest
      
    steps:
      - name: Checkout source
        run: |
          git clone https://codeberg.org/Freeyourgadget/Gadgetbridge.git
          cd Gadgetbridge
      
      - name: Build APK
        run: |
          cd Gadgetbridge
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-apk
          path: Gadgetbridge/app/build/outputs/apk/release/*.apk
