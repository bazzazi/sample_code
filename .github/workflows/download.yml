name: Build and Commit APK to Repo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repo (your repository)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Checkout Gadgetbridge source
        run: |
          git clone --depth 1 https://codeberg.org/Freeyourgadget/Gadgetbridge.git
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            Gadgetbridge/.gradle
            Gadgetbridge/build
          key: ${{ runner.os }}-gradle-${{ hashFiles('Gadgetbridge/build.gradle', 'Gadgetbridge/app/build.gradle', 'Gadgetbridge/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/platforms
            /usr/local/lib/android/sdk/build-tools
          key: ${{ runner.os }}-android-sdk-${{ hashFiles('**/build.gradle') }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
      
      - name: Build Debug APK
        run: |
          cd Gadgetbridge
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      
      - name: Find and copy APK files
        run: |
          echo "=== جستجوی فایل‌های APK ==="
          find ./Gadgetbridge -name "*.apk" -type f -exec ls -lh {} \;
          
          # کپی کردن به ریشه مخزن
          find ./Gadgetbridge -name "*.apk" -exec cp {} ./ \;
          
          # نمایش فایل‌های کپی شده
          echo "=== فایل‌های آماده برای آپلود ==="
          ls -la *.apk 2>/dev/null || echo "هیچ فایل APK ای پیدا نشد!"
      
      - name: Commit and Push to Repository
        run: |
          # تنظیم کاربر
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # اضافه کردن فایل‌ها
          git add -f *.apk 2>/dev/null || echo "No APK files found"
          
          # بررسی تغییرات
          if git diff --staged --quiet; then
            echo "ℹ️ هیچ تغییر جدیدی برای commit وجود ندارد"
          else
            # انجام commit
            git commit -m "Add Gadgetbridge Debug APK - $(date '+%Y-%m-%d %H:%M:%S')"
            
            # push
            git push -u origin main || git push origin main
            echo "✅ فایل‌ها با موفقیت به مخزن اضافه شدند!"
          fi
      
      - name: Show download links
        if: success()
        run: |
          echo ""
          echo "=========================================="
          echo "✅ لینک‌های دانلود مستقیم:"
          echo "=========================================="
          echo ""
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/Gadgetbridge-debug.apk"
          echo "=========================================="
      
      - name: Clean up Gradle cache (optional)
        run: |
          rm -rf ~/.gradle/caches/transforms-*
          rm -rf ~/.gradle/caches/build-cache-*
