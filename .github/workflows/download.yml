name: Download Gadgetbridge from APKPure

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download from APKPure (Method A)
        run: |
          echo "Trying APKPure (Version 0.90.0)..."
          curl -L -o Gadgetbridge.apk "https://m.apkpure.net/gadgetbridge/nodomain.freeyourgadget.gadgetbridge/download?from=details"
          sleep 5 # منتظر میمونیم تا دانلود شروع بشه
          ls -la Gadgetbridge.apk

      - name: If APKPure fails, try APKCombo (Method B)
        if: failure() || steps.download.outputs.status == 'failure'
        run: |
          echo "Trying APKCombo..."
          curl -L -o Gadgetbridge.apk "https://apkcombo.com/gadgetbridge/nodomain.freeyourgadget.gadgetbridge/download/apk"
          ls -la Gadgetbridge.apk

      - name: Check if download worked
        run: |
          SIZE=$(stat -c%s Gadgetbridge.apk)
          echo "File size: $SIZE bytes"
          if [ $SIZE -lt 1048576 ]; then # کمتر از 1 مگ
            echo "Download failed (file too small). Trying final fallback..."
            exit 1
          fi
          echo "Success!"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Gadgetbridge.apk
          git commit -m "Add Gadgetbridge APK (downloaded via alternative source)" || echo "No changes"
          git push
