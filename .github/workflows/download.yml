name: Download Gadgetbridge from GitHub Mirror

on:
  workflow_dispatch:  # نیاز به اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # دسترسی خواندن برای دانلود از ریپازیتوری[citation:3]
    
    steps:
      - name: Download from GitHub Releases
        run: |
          # دانلود مستقیم از آینه گیت‌هاب (بدون نیاز به Codeberg)
          wget https://github.com/Freeyourgadget/Gadgetbridge/releases/download/0.90.0/Gadgetbridge-0.90.0.apk
      
      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-latest
          path: Gadgetbridge-0.90.0.apk
