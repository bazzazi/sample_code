name: Download Gadgetbridge from GitHub Releases

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release info
        id: get_release
        run: |
          # دریافت اطلاعات آخرین نسخه از GitHub API
          RELEASE_INFO=$(curl -s https://api.github.com/repos/Freeyourgadget/Gadgetbridge/releases/latest)
          # استخراج لینک دانلود فایل استاندارد
          DOWNLOAD_URL=$(echo "$RELEASE_INFO" | grep -o "https://github.com/Freeyourgadget/Gadgetbridge/releases/download/[^\"]*Gadgetbridge-[^\"]*\.apk" | head -1)
          echo "url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
          echo "Found download URL: $DOWNLOAD_URL"
      
      - name: Download APK
        run: |
          curl -L -o Gadgetbridge.apk "${{ steps.get_release.outputs.url }}"
          
          # بررسی حجم فایل
          FILE_SIZE=$(stat -c%s Gadgetbridge.apk)
          echo "File size: $FILE_SIZE bytes"
          
          if [ $FILE_SIZE -lt 100000 ]; then
            echo "Error: File too small ($FILE_SIZE bytes)"
            exit 1
          fi
          
          echo "Download successful!"
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge
          path: Gadgetbridge.apk
