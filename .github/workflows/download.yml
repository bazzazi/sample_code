name: Build Gadgetbridge Simple

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        run: git clone https://codeberg.org/Freeyourgadget/Gadgetbridge.git
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34'
      
      - name: Build
        run: |
          cd Gadgetbridge
          chmod +x gradlew
          ./gradlew assembleRelease
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge
          path: Gadgetbridge/app/build/outputs/apk/release/*.apk
