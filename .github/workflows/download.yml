name: Download Gadgetbridge

on:
  workflow_dispatch:  # با این گزینه، خودت دستی اجراش می‌کنی

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download APK from GitHub Releases
        run: |
          curl -L -o Gadgetbridge.apk https://f-droid.org/repo/nodomain.freeyourgadget.gadgetbucket_810.apk
      
      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-app
          path: Gadgetbridge-0.90.0.apk
