name: Download Gadgetbridge from OpenAPK

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Download from OpenAPK
        run: |
          echo "⬇️ دانلود Gadgetbridge از OpenAPK..."
          curl -L -o Gadgetbridge.apk "https://www.openapk.net/download/246/nodomain.freeyourgadget.gadgetbridge"
          
          # بررسی حجم فایل
          FILE_SIZE=$(stat -c%s Gadgetbridge.apk)
          echo "📦 حجم فایل: $((FILE_SIZE / 1024 / 1024)) MB"
          
          if [ $FILE_SIZE -lt 10000000 ]; then
            echo "❌ خطا: حجم فایل خیلی کم است!"
            exit 1
          fi
          
          echo "✅ دانلود موفقیت‌آمیز بود"
      
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Gadgetbridge.apk
          git commit -m "Add Gadgetbridge APK from OpenAPK" || echo "No changes"
          git push
          echo "✅ فایل با موفقیت به مخزن اضافه شد"
      
      - name: Show download link
        run: |
          echo "=========================================="
          echo "لینک دانلود مستقیم از مخزن شما:"
          echo "https://raw.githubusercontent.com/${{ github.repository }}/main/Gadgetbridge.apk"
          echo "=========================================="
