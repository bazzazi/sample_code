name: Download Latest Gadgetbridge from F-Droid

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest Gadgetbridge APK
        run: |
          curl -L -o Gadgetbridge.apk https://f-droid.org/repo/nodomain.freeyourgadget.gadgetbridge_810.apk
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-latest
          path: Gadgetbridge.apk
