name: Download Gadgetbridge

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download from GitHub Releases
        run: |
          curl -L -o Gadgetbridge.apk https://github.com/Freeyourgadget/Gadgetbridge/releases/download/0.90.0/Gadgetbridge-0.90.0.apk
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge
          path: Gadgetbridge.apk
