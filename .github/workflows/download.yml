name: Download External File

on:
  workflow_dispatch:  # نیاز به اجرای دستی

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download from Codeberg
        run: wget https://github.com/Freeyourgadget/Gadgetbridge/releases/download/0.90.0/Gadgetbridge-0.90.0.apk
      - name: Upload as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-file  # نام فایل
          path: Gadgetbridge-0.78.0.apk  # مسیر فایل دانلودی
