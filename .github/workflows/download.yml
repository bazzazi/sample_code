name: Download Gadgetbridge via gitsnipe

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download using gitsnipe
        run: |
          npx rjsr @sigmasd/gitsnipe https://codeberg.org/Freeyourgadget/Gadgetbridge .
          ls -la
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-files
          path: .
